version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: report-generator-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - UPLOAD_FOLDER=${UPLOAD_FOLDER:-/app/uploads}
      - OUTPUT_FOLDER=${OUTPUT_FOLDER:-/app/outputs}
      # IMPORTANT: Timeout de 1 heure et intervalle de 5 minutes pour éviter les suppressions prématurées
      - CLEANUP_INTERVAL=${CLEANUP_INTERVAL:-300}
      - FILE_TIMEOUT=${FILE_TIMEOUT:-3600}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/api/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: report-generator-nginx
    restart: unless-stopped
    # Ports are commented out - use your shared proxy network instead
    # If you need direct access, uncomment and use a different port (e.g., "8080:80")
    # ports:
    #   - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
      - shared-proxy

  # ── OnlyOffice Document Server ──────────────────────────────────────────────
  # Full in-browser Word editor (Community Edition, open-source)
  # Needs ~2 GB RAM. JWT_SECRET must match ONLYOFFICE_JWT_SECRET in backend.
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: report-generator-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=${ONLYOFFICE_JWT_ENABLED:-true}
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-changeme_replace_in_production}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
    # ── Port mapping (local dev only) ─────────────────────────────────────────
    # In production, OnlyOffice is accessed via Nginx at /office/ (internal only).
    # Uncomment only for local development:
    # ports:
    #   - "${ONLYOFFICE_PORT:-8080}:80"
    networks:
      - app-network    # Nginx proxies /office/ → http://onlyoffice/ internally
      # Note: NOT on shared-proxy — OnlyOffice must not be publicly exposed.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s  # OnlyOffice takes ~1 min to start

networks:
  app-network:
    driver: bridge
  shared-proxy:
    external: true

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache: