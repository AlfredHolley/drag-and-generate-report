version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: report-generator-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - UPLOAD_FOLDER=${UPLOAD_FOLDER:-/app/uploads}
      - OUTPUT_FOLDER=${OUTPUT_FOLDER:-/app/outputs}
      # IMPORTANT: Timeout de 1 heure et intervalle de 5 minutes pour éviter les suppressions prématurées
      - CLEANUP_INTERVAL=${CLEANUP_INTERVAL:-300}
      - FILE_TIMEOUT=${FILE_TIMEOUT:-3600}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/api/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: report-generator-nginx
    restart: unless-stopped
    # Ports are commented out - use your shared proxy network instead
    # If you need direct access, uncomment and use a different port (e.g., "8080:80")
    # ports:
    #   - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
      - shared-proxy

networks:
  app-network:
    driver: bridge
  shared-proxy:
    external: true