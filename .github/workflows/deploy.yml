name: Deploy to VPS

on:
  push:
    branches:
      - main  # Change to 'master' if your main branch is 'master'
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy to VPS Hostinger
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${{ secrets.VPS_PORT || 22 }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ${{ secrets.VPS_PROJECT_PATH }} && bash scripts/update.sh"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
