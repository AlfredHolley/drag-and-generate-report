server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # IMPORTANT: Buffer size pour les uploads (évite troncature)
    client_body_buffer_size 1M;
    client_max_body_size 10M;

    # Frontend static files - Security headers uniquement pour les fichiers statiques
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
        # Security headers pour le frontend uniquement
        # Utiliser DENY pour cohérence avec Flask (plus sécurisé)
        # add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # API proxy to Flask backend
    # Note: Les headers de sécurité sont gérés par Flask, ne pas les dupliquer ici
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # CRITIQUE pour uploads multipart - évite la troncature
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Ne pas ajouter de headers de sécurité ici - Flask les gère déjà
        # Cela évite les conflits de headers multiples
    }

    # ── OnlyOffice Document Server proxy ─────────────────────────────────────
    # Routes /office/ → OnlyOffice container on app-network.
    # The editor iframe is loaded by the browser through this path.
    location /office/ {
        proxy_pass http://onlyoffice/;
        proxy_http_version 1.1;

        # WebSocket support (required by OnlyOffice)
        # $connection_upgrade is defined in nginx.conf via map directive
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Large body for document uploads/downloads
        client_max_body_size 100M;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 75s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:5000/api/health;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
